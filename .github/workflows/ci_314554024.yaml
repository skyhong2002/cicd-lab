name: CI 314554024

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-314554024-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, format, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier check
        run: npm run format:check

      - name: Run tests
        run: |
          mkdir -p reports
          npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Vitest test results
          path: reports/vitest-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-junit-report
          path: reports/vitest-junit.xml
          if-no-files-found: error
